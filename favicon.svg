<?xml version="1.0" encoding="UTF-8"?>
<!--
  Tozan Pilgrimage favicon
  Torii gate (the iconic Japanese shrine gate) on the site's signature
  purple-blue gradient. Designed as a single shape per element for crisp
  rendering down to 16x16. No external dependencies.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" role="img" aria-label="Tozan Pilgrimage">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"  stop-color="#667eea"/>
      <stop offset="100%" stop-color="#764ba2"/>
    </linearGradient>
  </defs>

  <!-- Rounded background using the site's signature gradient -->
  <rect width="32" height="32" rx="6" fill="url(#bg)"/>

  <!-- Torii gate, white -->
  <g fill="#ffffff">
    <!-- Kasagi (top beam) with gentle upturned ends -->
    <path d="M3.5 9 Q16 5.5 28.5 9 L26.5 12 L5.5 12 Z"/>
    <!-- Nuki (tie beam) -->
    <rect x="6" y="13.5" width="20" height="2.4"/>
    <!-- Left pillar -->
    <rect x="9" y="15.9" width="2.8" height="13.1"/>
    <!-- Right pillar -->
    <rect x="20.2" y="15.9" width="2.8" height="13.1"/>
  </g>
</svg>
